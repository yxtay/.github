name: scans
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  workflow_call:
    inputs:
      flavors:
        description: "JSON array of megalinter flavors to run"
        type: string
        default: '["security", "formatters"]'
  workflow_dispatch:
    inputs:
      flavors:
        description: "JSON array of megalinter flavors to run"
        type: string
        default: '["security", "formatters"]'
permissions: {}
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_name != github.event.repository.default_branch }}
jobs:
  megalinter:
    strategy:
      fail-fast: false
      matrix:
        flavor: ${{ fromJson(inputs.flavors || '["security", "formatters"]') }}
    permissions:
      contents: write
      pull-requests: write
      security-events: write
      statuses: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: ${{ github.event_name == 'pull_request' }} # zizmor: ignore[artipacked]
          fetch-depth: (${{ github.event.pull_request.commits || 2 }} + 1)
      - name: copy event file
        run: cp "$GITHUB_EVENT_PATH" "$GITHUB_WORKSPACE/event.json"
      - name: megalinter
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock:rw \
            -v "$GITHUB_WORKSPACE:/tmp/lint" \
            -e DEFAULT_WORKSPACE=/tmp/lint \
            -e VALIDATE_ALL_CODEBASE \
            -e DISABLE_ERRORS \
            -e SARIF_REPORTER=true \
            -e GITHUB_TOKEN \
            -e GITHUB_ACTIONS=true \
            -e GITHUB_EVENT_NAME \
            -e GITHUB_EVENT_PATH=/tmp/lint/event.json \
            -e GITHUB_REPOSITORY \
            -e GITHUB_SHA \
            -e GITHUB_REF \
            -e GITHUB_RUN_ID \
            -e GITHUB_SERVER_URL \
            -e GITHUB_API_URL \
            "ghcr.io/oxsecurity/megalinter${FLAVOR_SUFFIX}:v9.5.0"
        env:
          VALIDATE_ALL_CODEBASE: ${{ github.ref_name != github.event.repository.default_branch }}
          DISABLE_ERRORS: ${{ github.ref_name != github.event.repository.default_branch }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_API_URL: ${{ github.api_url }}
          FLAVOR_SUFFIX: ${{ matrix.flavor == 'all' && '' || format('-{0}', matrix.flavor) }}
      - if: ${{ success() || failure() }}
        name: fix report permissions
        run: sudo chown -R "$(id -u):$(id -g)" megalinter-reports || true
      - if: ${{ success() || failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: megalinter-reports-${{ matrix.flavor }}
          path: megalinter-reports
      - if: ${{ success() || failure() }}
        id: sarif-check
        name: check SARIF has results
        run: |
          SARIF="megalinter-reports/megalinter-report.sarif"
          if [ -f "$SARIF" ] && jq -e '.runs[].results | length > 0' "$SARIF" > /dev/null 2>&1; then
            echo "has_results=true" >> "$GITHUB_OUTPUT"
          fi
      - if: ${{ (success() || failure()) && steps.sarif-check.outputs.has_results == 'true' }}
        uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4
        with:
          sarif_file: megalinter-reports/megalinter-report.sarif
          ref: ${{ github.head_ref && format('refs/heads/{0}', github.head_ref) || github.ref }}
          sha: ${{ github.event.pull_request.head.sha || github.sha }}
          category: megalinter-${{ matrix.flavor }}
      - if: ${{ github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork }}
        name: commit changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then exit 0; fi
          git config user.email "${GITHUB_ACTOR_ID}+${GITHUB_ACTOR}@users.noreply.github.com"
          git config user.name "${GITHUB_ACTOR}"
          git commit --all --message "${COMMIT_MESSAGE}"
          git push origin "HEAD:refs/heads/${GITHUB_HEAD_REF}"
        env:
          COMMIT_MESSAGE: "fix: apply megalinter fixes"
          GITHUB_ACTOR: megalinter-bot
          GITHUB_ACTOR_ID: 129584137
