name: scans
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  workflow_call:
    inputs:
      run-all:
        required: false
        type: boolean
        default: false
      run-documentation:
        required: false
        type: boolean
        default: false
      run-formatters:
        required: false
        type: boolean
        default: true
      run-python:
        required: false
        type: boolean
        default: false
      run-security:
        required: false
        type: boolean
        default: true
  workflow_dispatch:
    inputs:
      run-all:
        required: false
        type: boolean
        default: false
      run-documentation:
        required: false
        type: boolean
        default: false
      run-formatters:
        required: false
        type: boolean
        default: true
      run-python:
        required: false
        type: boolean
        default: false
      run-security:
        required: false
        type: boolean
        default: true

permissions: {}
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_name != github.event.repository.default_branch }}

jobs:
  megalinter-all:
    if: ${{ inputs.run-all }}
    permissions:
      contents: write
      pull-requests: write
      statuses: write
    runs-on: ubuntu-latest
    steps:
      # nosemgrep
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: ${{ github.event_name == 'pull_request' }} # zizmor: ignore[artipacked]
          fetch-depth: (${{ github.event.pull_request.commits || 2 }} + 1)
      - id: megalinter
        # nosemgrep
        uses: oxsecurity/megalinter@0e3ce9b9c8c10effb9b269509cc47ca17cae31c7 # v9
        env:
          VALIDATE_ALL_CODEBASE: ${{ github.ref_name != github.event.repository.default_branch }}
          DISABLE_ERRORS: ${{ github.ref_name != github.event.repository.default_branch }}
          GITHUB_TOKEN: ${{ github.token }}
      - if: ${{ success() || failure() }}
        # nosemgrep
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: megalinter-reports
          path: megalinter-reports
      - if: ${{ steps.megalinter.outputs.has_updated_sources == 1 && github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork }}
        name: commit changes
        run: |
          git config user.email "${GITHUB_ACTOR_ID}+${GITHUB_ACTOR}@users.noreply.github.com"
          git config user.name "${GITHUB_ACTOR}"
          git commit --all --message "${COMMIT_MESSAGE}"
          git push origin "HEAD:refs/heads/${GITHUB_HEAD_REF}"
        env:
          COMMIT_MESSAGE: "fix: apply megalinter fixes"
          GITHUB_ACTOR: megalinter-bot
          GITHUB_ACTOR_ID: 129584137

  megalinter-documentation:
    if: ${{ inputs.run-documentation }}
    permissions:
      contents: write
      pull-requests: write
      statuses: write
    runs-on: ubuntu-latest
    steps:
      # nosemgrep
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: ${{ github.event_name == 'pull_request' }} # zizmor: ignore[artipacked]
          fetch-depth: (${{ github.event.pull_request.commits || 2 }} + 1)
      - id: megalinter
        # nosemgrep
        uses: oxsecurity/megalinter/flavors/documentation@0e3ce9b9c8c10effb9b269509cc47ca17cae31c7 # v9
        env:
          VALIDATE_ALL_CODEBASE: ${{ github.ref_name != github.event.repository.default_branch }}
          DISABLE_ERRORS: ${{ github.ref_name != github.event.repository.default_branch }}
          GITHUB_TOKEN: ${{ github.token }}
      - if: ${{ success() || failure() }}
        # nosemgrep
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: megalinter-reports-documentation
          path: megalinter-reports
      - if: ${{ steps.megalinter.outputs.has_updated_sources == 1 && github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork }}
        name: commit changes
        run: |
          git config user.email "${GITHUB_ACTOR_ID}+${GITHUB_ACTOR}@users.noreply.github.com"
          git config user.name "${GITHUB_ACTOR}"
          git commit --all --message "${COMMIT_MESSAGE}"
          git push origin "HEAD:refs/heads/${GITHUB_HEAD_REF}"
        env:
          COMMIT_MESSAGE: "fix: apply megalinter fixes"
          GITHUB_ACTOR: megalinter-bot
          GITHUB_ACTOR_ID: 129584137

  megalinter-formatters:
    if: ${{ !contains(fromJSON('["workflow_call", "workflow_dispatch"]'), github.event_name) || inputs.run-formatters }}
    permissions:
      contents: write
      pull-requests: write
      statuses: write
    runs-on: ubuntu-latest
    steps:
      # nosemgrep
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: ${{ github.event_name == 'pull_request' }} # zizmor: ignore[artipacked]
          fetch-depth: (${{ github.event.pull_request.commits || 2 }} + 1)
      - id: megalinter
        # nosemgrep
        uses: oxsecurity/megalinter/flavors/formatters@0e3ce9b9c8c10effb9b269509cc47ca17cae31c7 # v9
        env:
          VALIDATE_ALL_CODEBASE: ${{ github.ref_name != github.event.repository.default_branch }}
          DISABLE_ERRORS: ${{ github.ref_name != github.event.repository.default_branch }}
          GITHUB_TOKEN: ${{ github.token }}
      - if: ${{ success() || failure() }}
        # nosemgrep
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: megalinter-reports-formatters
          path: megalinter-reports
      - if: ${{ steps.megalinter.outputs.has_updated_sources == 1 && github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork }}
        name: commit changes
        run: |
          git config user.email "${GITHUB_ACTOR_ID}+${GITHUB_ACTOR}@users.noreply.github.com"
          git config user.name "${GITHUB_ACTOR}"
          git commit --all --message "${COMMIT_MESSAGE}"
          git push origin "HEAD:refs/heads/${GITHUB_HEAD_REF}"
        env:
          COMMIT_MESSAGE: "fix: apply megalinter fixes"
          GITHUB_ACTOR: megalinter-bot
          GITHUB_ACTOR_ID: 129584137

  megalinter-python:
    if: ${{ inputs.run-python }}
    permissions:
      contents: write
      pull-requests: write
      statuses: write
    runs-on: ubuntu-latest
    steps:
      # nosemgrep
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: ${{ github.event_name == 'pull_request' }} # zizmor: ignore[artipacked]
          fetch-depth: (${{ github.event.pull_request.commits || 2 }} + 1)
      - id: megalinter
        # nosemgrep
        uses: oxsecurity/megalinter/flavors/python@0e3ce9b9c8c10effb9b269509cc47ca17cae31c7 # v9
        env:
          VALIDATE_ALL_CODEBASE: ${{ github.ref_name != github.event.repository.default_branch }}
          DISABLE_ERRORS: ${{ github.ref_name != github.event.repository.default_branch }}
          GITHUB_TOKEN: ${{ github.token }}
      - if: ${{ success() || failure() }}
        # nosemgrep
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: megalinter-reports-python
          path: megalinter-reports
      - if: ${{ steps.megalinter.outputs.has_updated_sources == 1 && github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork }}
        name: commit changes
        run: |
          git config user.email "${GITHUB_ACTOR_ID}+${GITHUB_ACTOR}@users.noreply.github.com"
          git config user.name "${GITHUB_ACTOR}"
          git commit --all --message "${COMMIT_MESSAGE}"
          git push origin "HEAD:refs/heads/${GITHUB_HEAD_REF}"
        env:
          COMMIT_MESSAGE: "fix: apply megalinter fixes"
          GITHUB_ACTOR: megalinter-bot
          GITHUB_ACTOR_ID: 129584137

  megalinter-security:
    if: ${{ !contains(fromJSON('["workflow_call", "workflow_dispatch"]'), github.event_name) || inputs.run-security }}
    permissions:
      contents: write
      pull-requests: write
      security-events: write
      statuses: write
    runs-on: ubuntu-latest
    steps:
      # nosemgrep
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: ${{ github.event_name == 'pull_request' }} # zizmor: ignore[artipacked]
          fetch-depth: (${{ github.event.pull_request.commits || 2 }} + 1)
      - id: megalinter
        # nosemgrep
        uses: oxsecurity/megalinter/flavors/security@0e3ce9b9c8c10effb9b269509cc47ca17cae31c7 # v9
        env:
          VALIDATE_ALL_CODEBASE: ${{ github.ref_name != github.event.repository.default_branch }}
          DISABLE_ERRORS: ${{ github.ref_name != github.event.repository.default_branch }}
          GITHUB_TOKEN: ${{ github.token }}
      - if: ${{ success() || failure() }}
        # nosemgrep
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: megalinter-reports-security
          path: megalinter-reports
      - if: ${{ success() || failure() }}
        # nosemgrep
        uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4
        with:
          sarif_file: megalinter-reports/megalinter-report.sarif
          ref: ${{ github.head_ref && format('refs/heads/{0}', github.head_ref) || github.ref }}
          sha: ${{ github.event.pull_request.head.sha || github.sha }}
          category: megalinter-security
